<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="100%" height="220" style="background:#0d1117; border-radius: 8px;">
  <style>
    @keyframes draw {
      0% { stroke-dashoffset: 1200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 700;
      fill: #f0f6fc;
      font-size: 34px;
      letter-spacing: 1px;
    }
    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 400;
      fill: #8b949e;
      font-size: 16px;
      letter-spacing: 3px;
    }
    .cursor {
      fill: #58a6ff;
      animation: blink 0.9s step-end infinite;
    }
    .wave-line {
      stroke: url(#line-grad);
      stroke-width: 1.5;
      fill: none;
      opacity: 0.3;
      stroke-dasharray: 1200;
      animation: draw 8s linear infinite;
    }
    .wave-line-2 {
      stroke: url(#line-grad-2);
      stroke-width: 1;
      fill: none;
      opacity: 0.15;
      stroke-dasharray: 1200;
      animation: draw 12s linear infinite;
    }
  </style>
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0" />
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="line-grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ff7b72" stop-opacity="1" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Animated Wave Lines -->
  <path d="M 50,150 Q 200,90 400,150 T 750,150" class="wave-line" />
  <path d="M 80,130 Q 250,190 450,110 T 780,130" class="wave-line-2" />

  <!-- Typography -->
  <text x="60" y="95" class="title">Saket Chawla</text>
  <text x="60" y="135" class="subtitle">Software Engineer &amp; AI/ML Developer</text>
  <rect x="428" y="120" width="2" height="18" class="cursor" />
</svg>
